name: ci

on:
  pull_request:
  push:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: factory
          POSTGRES_PASSWORD: factory
          POSTGRES_DB: factory
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U factory -d factory"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Lint
        run: ruff check .
      - name: Tests with coverage
        env:
          JWT_SECRET_KEY: ci-8df6e433ea1649309e9ceea7d95c95a9
          DATABASE_URL: postgresql+asyncpg://factory:factory@localhost:5432/factory
          REDIS_URL: redis://localhost:6379/0
          CELERY_BROKER_URL: redis://localhost:6379/1
          CELERY_RESULT_BACKEND: redis://localhost:6379/2
        run: pytest
      - name: Docker build
        run: docker build -t autonomous-ai-software-factory:ci .

